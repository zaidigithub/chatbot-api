<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMaid Medical Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="app-shell">
        <section class="hero">
            <p class="eyebrow">MetaMaid</p>
            <h1>Medical Symptom Chatbot</h1>
            <p class="hero-copy">
                Enter your symptoms and MetaMaid will predict the possible disease and precautions.
            </p>
        </section>

        <section class="chat-card">
            <div id="chat-messages" class="chat-messages" aria-live="polite">
                <article class="message bot">
                    <div class="message-bubble">
                        Hello! I am MetaMaid. Tell me your symptoms like fever, cough, headache, nausea, or many others.
                    </div>
                </article>
            </div>

            <form id="chat-form" class="chat-form">
                <label class="sr-only" for="message">Symptoms</label>
                <textarea
                    id="message"
                    name="message"
                    rows="1"
                    placeholder="Enter symptoms like fever, cough, sore throat"
                    required
                ></textarea>
                <button type="submit">Analyze</button>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
